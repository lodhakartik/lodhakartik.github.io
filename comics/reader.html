<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#FBF1D9" />
  <title>Comic Reader · Kartik Lodha</title>
  <meta name="robots" content="noai, noimageai" />
  <meta name="author" content="Kartik Lodha" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Patrick+Hand&family=Yatra+One&display=swap" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" defer></script>

  <style>
    :root {
      --parchment-light: #FBF1D9;
      --parchment:       #F2E2B1;
      --parchment-dark:  #E5CE8A;
      --maroon:          #7A1D1D;
      --gold:            #C8A14B;
      --gold-deep:       #8C6A1F;
      --ink:             #3A1F0E;
      --ink-soft:        #5C3A1F;
      --shadow-soft: 0 2px 0 rgba(58,31,14,.10), 0 6px 18px rgba(58,31,14,.10);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; overscroll-behavior: none; }
    body {
      font-family: "Patrick Hand", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 10%, rgba(200,161,75,.18), transparent 40%),
        radial-gradient(circle at 80% 90%, rgba(122,29,29,.10), transparent 40%),
        linear-gradient(180deg, var(--parchment-light), var(--parchment));
      display: flex;
      flex-direction: column;
      touch-action: manipulation;
    }

    .topbar {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(200,161,75,.4);
      background: rgba(255,248,225,.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .back {
      justify-self: start;
      font-family: "Caveat", cursive;
      font-weight: 700;
      font-size: 22px;
      color: var(--maroon);
      text-decoration: none;
      padding: 4px 10px;
      border-radius: 999px;
    }
    .back:hover { background: rgba(122,29,29,.08); }
    .title-block { text-align: center; min-width: 0; }
    .title-block h1 {
      margin: 0;
      font-family: "Caveat", cursive;
      font-weight: 700;
      font-size: 26px;
      color: var(--maroon);
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .title-block p {
      margin: 0;
      font-size: 13px;
      color: var(--ink-soft);
      opacity: 0.8;
    }
    .mode-toggle {
      justify-self: end;
      display: inline-flex;
      background: rgba(255,248,225,.7);
      border: 1.5px solid var(--gold);
      border-radius: 999px;
      padding: 3px;
      gap: 2px;
    }
    .mode-btn {
      appearance: none;
      border: 0;
      background: transparent;
      font-family: "Caveat", cursive;
      font-weight: 700;
      font-size: 18px;
      color: var(--gold-deep);
      padding: 4px 14px;
      border-radius: 999px;
      cursor: pointer;
      letter-spacing: 0.3px;
    }
    .mode-btn.active {
      background: var(--maroon);
      color: #FFF8E7;
    }
    .mode-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .stage {
      flex: 1 1 auto;
      position: relative;
      overflow: hidden;
    }
    .frame {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    .wrap {
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: 0 0;
      transition: transform 420ms cubic-bezier(0.4, 0.15, 0.2, 1);
      will-change: transform;
      box-shadow: 0 8px 28px rgba(58,31,14,.18);
      background: #fff;
    }
    .wrap canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      appearance: none;
      border: 1.5px solid var(--gold);
      background: rgba(255,248,225,.85);
      color: var(--maroon);
      width: 48px;
      height: 48px;
      border-radius: 999px;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      display: grid;
      place-items: center;
      padding: 0;
      transition: background 150ms ease, transform 150ms ease;
      z-index: 5;
    }
    .nav-btn:hover:not(:disabled) { background: #fff; transform: translateY(-50%) scale(1.06); }
    .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .nav-prev { left: 14px; }
    .nav-next { right: 14px; }

    .bottombar {
      flex: 0 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      padding: 8px 16px calc(8px + env(safe-area-inset-bottom));
      border-top: 1px solid rgba(200,161,75,.4);
      background: rgba(255,248,225,.55);
      font-size: 15px;
      color: var(--ink-soft);
      flex-wrap: wrap;
    }
    .indicator {
      font-family: "Caveat", cursive;
      font-weight: 700;
      font-size: 20px;
      color: var(--gold-deep);
    }
    .page-title {
      font-family: "Caveat", cursive;
      font-weight: 700;
      font-size: 20px;
      color: var(--maroon);
      opacity: 0.85;
    }
    .page-title::before {
      content: "·";
      margin-right: 10px;
      opacity: 0.6;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 10;
      pointer-events: none;
    }
    .overlay[hidden] { display: none !important; }
    .overlay-card {
      background: rgba(255,248,225,.92);
      border: 2px solid var(--gold);
      border-radius: 18px;
      padding: 22px 28px;
      box-shadow: var(--shadow-soft);
      text-align: center;
      max-width: 80vw;
      pointer-events: auto;
    }
    .overlay-card h2 {
      font-family: "Caveat", cursive;
      font-weight: 700;
      font-size: 30px;
      color: var(--maroon);
      margin: 0 0 6px;
    }
    .overlay-card p { margin: 4px 0 0; color: var(--ink-soft); font-size: 16px; }
    .spinner {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 3px solid var(--parchment-dark);
      border-top-color: var(--maroon);
      animation: spin 0.9s linear infinite;
      margin: 6px auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress {
      width: 200px;
      height: 8px;
      background: var(--parchment-dark);
      border-radius: 999px;
      overflow: hidden;
      margin: 10px auto 0;
    }
    .progress > div {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--maroon));
      width: 0%;
      transition: width 200ms ease;
    }

    @media (max-width: 560px) {
      .topbar { padding: 8px 10px; gap: 6px; }
      .title-block h1 { font-size: 20px; }
      .title-block p { display: none; }
      .back { font-size: 18px; padding: 4px 8px; }
      .mode-btn { font-size: 16px; padding: 3px 10px; }
      .nav-btn { width: 40px; height: 40px; font-size: 24px; }
      .nav-prev { left: 8px; }
      .nav-next { right: 8px; }
      .indicator, .page-title { font-size: 17px; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <a class="back" href="./" aria-label="Back to comics">&#x2190; Comics</a>
    <div class="title-block">
      <h1 id="title">Loading…</h1>
      <p id="subtitle"></p>
    </div>
    <div class="mode-toggle" role="tablist" aria-label="View mode">
      <button id="mode-page" class="mode-btn active" role="tab" aria-selected="true">Page</button>
      <button id="mode-panel" class="mode-btn" role="tab" aria-selected="false">Panel</button>
    </div>
  </header>

  <main class="stage">
    <div class="frame" id="frame">
      <div class="wrap" id="wrap"></div>
    </div>

    <button class="nav-btn nav-prev" id="prevBtn" aria-label="Previous" disabled>&#x2039;</button>
    <button class="nav-btn nav-next" id="nextBtn" aria-label="Next" disabled>&#x203A;</button>

    <div class="overlay" id="loadingOverlay">
      <div class="overlay-card">
        <div class="spinner" aria-hidden="true"></div>
        <h2>Opening the comic…</h2>
        <p>Loading pages, please hold.</p>
        <div class="progress" aria-hidden="true"><div id="progressBar"></div></div>
      </div>
    </div>

    <div class="overlay" id="errorOverlay" hidden>
      <div class="overlay-card">
        <h2>Could not open the comic</h2>
        <p id="errorMessage">Please refresh the page or check your connection.</p>
      </div>
    </div>
  </main>

  <footer class="bottombar">
    <div class="indicator" id="indicator">Page – of –</div>
    <div class="page-title" id="pageTitle"></div>
  </footer>

  <script>
    // ----- config / state -----
    const params = new URLSearchParams(location.search);
    const comicId = params.get('id') || 'guru-pushya-yog';
    const RENDER_TARGET_WIDTH = 2200; // px — render canvas at this width for crisp zoom

    let manifest = null;
    let pdf = null;
    let pageIdx = 0;            // 0-based index into manifest.pages
    let panelIdx = -1;          // -1 = full-page view, else panel index
    const renderCache = new Map();  // pdfPageNum -> canvas
    const inflight = new Map();     // pdfPageNum -> Promise<canvas>

    // ----- elements -----
    const el = (id) => document.getElementById(id);
    const wrap = el('wrap');
    const frame = el('frame');
    const loadingOverlay = el('loadingOverlay');
    const errorOverlay = el('errorOverlay');
    const progressBar = el('progressBar');

    // ----- init -----
    function whenPdfJsReady() {
      return new Promise((resolve) => {
        const check = () => {
          if (window.pdfjsLib) resolve();
          else setTimeout(check, 30);
        };
        check();
      });
    }

    function bumpReadCounter(id) {
      const url = `https://api.counterapi.dev/v1/lodhakartik/comic-${id}/up`;
      fetch(url, { cache: 'no-store' }).catch(() => {});
    }

    async function init() {
      try {
        bumpReadCounter(comicId);
        manifest = await fetch(`./${comicId}/manifest.json`, { cache: 'force-cache' })
          .then(r => { if (!r.ok) throw new Error('Manifest not found'); return r.json(); });

        document.title = `${manifest.title} · Kartik Lodha`;
        el('title').textContent = manifest.title;
        el('subtitle').textContent = manifest.subtitle || '';

        await whenPdfJsReady();
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const loadingTask = pdfjsLib.getDocument({
          url: `./${comicId}/${manifest.pdf}`,
          disableAutoFetch: false,
          disableStream: false,
        });
        loadingTask.onProgress = ({ loaded, total }) => {
          if (total) progressBar.style.width = Math.min(100, (loaded / total) * 100) + '%';
        };
        pdf = await loadingTask.promise;

        // restore state from hash
        const hashStr = location.hash.replace(/^#/, '');
        if (hashStr) {
          const hashParams = new URLSearchParams(hashStr);
          const p = parseInt(hashParams.get('p'), 10);
          if (!isNaN(p) && p >= 1 && p <= manifest.pages.length) pageIdx = p - 1;
          const pnRaw = hashParams.get('pn');
          if (pnRaw !== null) {
            const pn = parseInt(pnRaw, 10);
            if (!isNaN(pn)) panelIdx = pn;
          }
        }

        loadingOverlay.hidden = true;
        await renderCurrent();
        prefetchNeighbors();
        wireEvents();
      } catch (err) {
        console.error('[reader] init failed:', err);
        loadingOverlay.hidden = true;
        errorOverlay.hidden = false;
        const msg = (err && (err.message || err.name)) ? `${err.name || 'Error'}: ${err.message || ''}` : 'Unknown error';
        el('errorMessage').textContent = msg + '. Please refresh.';
      }
    }

    // ----- rendering -----
    async function getPageCanvas(pdfPageNum) {
      if (renderCache.has(pdfPageNum)) return renderCache.get(pdfPageNum);
      if (inflight.has(pdfPageNum)) return inflight.get(pdfPageNum);
      const task = (async () => {
        const page = await pdf.getPage(pdfPageNum);
        const baseVp = page.getViewport({ scale: 1 });
        const scale = RENDER_TARGET_WIDTH / baseVp.width;
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const ctx = canvas.getContext('2d', { alpha: false });
        await page.render({ canvasContext: ctx, viewport }).promise;
        renderCache.set(pdfPageNum, canvas);
        // simple LRU-ish cap
        if (renderCache.size > 5) {
          const firstKey = renderCache.keys().next().value;
          if (firstKey !== pdfPageNum) renderCache.delete(firstKey);
        }
        return canvas;
      })();
      inflight.set(pdfPageNum, task);
      task.finally(() => inflight.delete(pdfPageNum));
      return task;
    }

    function meta(idx) { return manifest.pages[idx]; }

    async function renderCurrent() {
      const m = meta(pageIdx);
      const canvas = await getPageCanvas(m.pdfPage);
      // mount canvas
      if (wrap.firstChild !== canvas) {
        while (wrap.firstChild) wrap.removeChild(wrap.firstChild);
        wrap.appendChild(canvas);
      }
      wrap.style.width = canvas.width + 'px';
      wrap.style.height = canvas.height + 'px';
      applyTransform();
      updateUI();
      updateHash();
    }

    function applyTransform() {
      const canvas = wrap.firstChild;
      if (!canvas) return;
      const CW = canvas.width;
      const CH = canvas.height;
      const vw = frame.clientWidth;
      const vh = frame.clientHeight;
      if (vw === 0 || vh === 0) {
        // layout not ready yet — retry next frame
        requestAnimationFrame(applyTransform);
        return;
      }
      const m = meta(pageIdx);
      let s, cx, cy;
      if (panelIdx >= 0 && m.panels && m.panels[panelIdx]) {
        const r = m.panels[panelIdx];
        const pw = r.w * CW, ph = r.h * CH;
        s = Math.min(vw / pw, vh / ph) * 0.94;
        cx = (r.x + r.w / 2) * CW;
        cy = (r.y + r.h / 2) * CH;
      } else {
        s = Math.min(vw / CW, vh / CH) * 0.96;
        cx = CW / 2;
        cy = CH / 2;
      }
      const tx = vw / 2 - cx * s;
      const ty = vh / 2 - cy * s;
      wrap.style.transform = `translate(${tx}px, ${ty}px) scale(${s})`;
    }

    function prefetchNeighbors() {
      const n = manifest.pages[pageIdx + 1];
      const p = manifest.pages[pageIdx - 1];
      if (n) getPageCanvas(n.pdfPage).catch(() => {});
      if (p) getPageCanvas(p.pdfPage).catch(() => {});
    }

    // ----- navigation -----
    function isFirstPosition() {
      if (pageIdx > 0) return false;
      if (panelIdx === -1) return true;
      return panelIdx <= 0;
    }
    function isLastPosition() {
      if (pageIdx < manifest.pages.length - 1) return false;
      const m = meta(pageIdx);
      if (panelIdx === -1) return true;
      return panelIdx >= Math.max(0, m.panels.length - 1);
    }

    async function next() {
      const m = meta(pageIdx);
      if (panelIdx === -1) {
        if (pageIdx < manifest.pages.length - 1) {
          pageIdx++;
          await renderCurrent();
          prefetchNeighbors();
        }
        return;
      }
      // panel mode
      if (m.panels.length > 0 && panelIdx < m.panels.length - 1) {
        panelIdx++;
        applyTransform();
        updateUI();
        updateHash();
        return;
      }
      // advance to next page's first panel (or full page if no panels)
      if (pageIdx < manifest.pages.length - 1) {
        pageIdx++;
        const nm = meta(pageIdx);
        panelIdx = nm.panels.length > 0 ? 0 : 0; // keep in panel mode; will fallback to full-page if 0 panels via applyTransform
        if (nm.panels.length === 0) panelIdx = 0; // index past end; applyTransform treats this as full-page
        await renderCurrent();
        prefetchNeighbors();
      }
    }

    async function prev() {
      if (panelIdx === -1) {
        if (pageIdx > 0) {
          pageIdx--;
          await renderCurrent();
          prefetchNeighbors();
        }
        return;
      }
      if (panelIdx > 0) {
        panelIdx--;
        applyTransform();
        updateUI();
        updateHash();
        return;
      }
      if (pageIdx > 0) {
        pageIdx--;
        const nm = meta(pageIdx);
        panelIdx = nm.panels.length > 0 ? nm.panels.length - 1 : 0;
        await renderCurrent();
        prefetchNeighbors();
      }
    }

    async function setMode(mode) {
      if (mode === 'page') {
        panelIdx = -1;
      } else {
        const m = meta(pageIdx);
        if (m.panels.length > 0) {
          panelIdx = 0;
        } else {
          // find next page with panels; else stay
          let foundIdx = -1;
          for (let i = pageIdx + 1; i < manifest.pages.length; i++) {
            if (manifest.pages[i].panels.length > 0) { foundIdx = i; break; }
          }
          if (foundIdx === -1) {
            // no panels anywhere; just keep cover with panel-toggle “active”
            panelIdx = 0; // applyTransform falls back to full page
          } else {
            pageIdx = foundIdx;
            panelIdx = 0;
            await renderCurrent();
            prefetchNeighbors();
            return;
          }
        }
      }
      applyTransform();
      updateUI();
      updateHash();
    }

    // ----- UI sync -----
    function updateUI() {
      const m = meta(pageIdx);
      el('pageTitle').textContent = m.title || '';
      let ind = `Page ${pageIdx + 1} of ${manifest.pages.length}`;
      if (panelIdx >= 0 && m.panels && m.panels.length > 0) {
        const p = Math.min(panelIdx, m.panels.length - 1) + 1;
        ind += `  ·  Panel ${p} of ${m.panels.length}`;
      }
      el('indicator').textContent = ind;
      el('mode-page').classList.toggle('active', panelIdx === -1);
      el('mode-page').setAttribute('aria-selected', String(panelIdx === -1));
      el('mode-panel').classList.toggle('active', panelIdx >= 0);
      el('mode-panel').setAttribute('aria-selected', String(panelIdx >= 0));
      el('prevBtn').disabled = isFirstPosition();
      el('nextBtn').disabled = isLastPosition();
    }

    function updateHash() {
      const p = new URLSearchParams();
      p.set('p', String(pageIdx + 1));
      if (panelIdx >= 0) p.set('pn', String(panelIdx));
      const newHash = '#' + p.toString();
      if (location.hash !== newHash) history.replaceState(null, '', newHash);
    }

    // ----- events -----
    function wireEvents() {
      el('prevBtn').addEventListener('click', prev);
      el('nextBtn').addEventListener('click', next);
      el('mode-page').addEventListener('click', () => setMode('page'));
      el('mode-panel').addEventListener('click', () => setMode('panel'));

      window.addEventListener('keydown', (e) => {
        if (e.target && e.target.tagName === 'INPUT') return;
        if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
          e.preventDefault(); next();
        } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
          e.preventDefault(); prev();
        } else if (e.key === 'p' || e.key === 'P') {
          setMode('page');
        } else if (e.key === 'c' || e.key === 'C') {
          setMode('panel');
        } else if (e.key === 'Home') {
          pageIdx = 0; panelIdx = (panelIdx >= 0 ? 0 : -1);
          renderCurrent().then(prefetchNeighbors);
        } else if (e.key === 'End') {
          pageIdx = manifest.pages.length - 1;
          const lm = meta(pageIdx);
          panelIdx = (panelIdx >= 0)
            ? Math.max(0, lm.panels.length - 1)
            : -1;
          renderCurrent().then(prefetchNeighbors);
        }
      });

      window.addEventListener('resize', () => applyTransform());

      // swipe navigation
      let sx = null, sy = null, st = 0;
      frame.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) { sx = null; return; }
        sx = e.touches[0].clientX;
        sy = e.touches[0].clientY;
        st = Date.now();
      }, { passive: true });
      frame.addEventListener('touchend', (e) => {
        if (sx === null) return;
        const t = e.changedTouches[0];
        const dx = t.clientX - sx;
        const dy = t.clientY - sy;
        const dt = Date.now() - st;
        if (dt < 600 && Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.4) {
          if (dx < 0) next(); else prev();
        }
        sx = sy = null;
      });

      // double-click on stage toggles modes
      frame.addEventListener('dblclick', () => {
        setMode(panelIdx === -1 ? 'panel' : 'page');
      });

      window.addEventListener('hashchange', () => {
        const hashParams = new URLSearchParams(location.hash.replace(/^#/, ''));
        const p = parseInt(hashParams.get('p'), 10);
        const pn = hashParams.get('pn');
        const newPage = (!isNaN(p) && p >= 1 && p <= manifest.pages.length) ? p - 1 : 0;
        const newPanel = (pn === null) ? -1 : parseInt(pn, 10);
        if (newPage !== pageIdx) {
          pageIdx = newPage;
          panelIdx = newPanel;
          renderCurrent().then(prefetchNeighbors);
        } else if (newPanel !== panelIdx) {
          panelIdx = newPanel;
          applyTransform();
          updateUI();
        }
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init, { once: true });
    } else {
      init();
    }
  </script>
</body>
</html>
