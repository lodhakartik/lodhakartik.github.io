<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#FBF1D9" />
  <title>Comic Reader · Kartik Lodha</title>
  <meta name="robots" content="noai, noimageai" />
  <meta name="author" content="Kartik Lodha" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Patrick+Hand&family=Yatra+One&display=swap" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" defer></script>

  <style>
    :root {
      --parchment-light: #FBF1D9;
      --parchment:       #F2E2B1;
      --parchment-dark:  #E5CE8A;
      --maroon:          #7A1D1D;
      --gold:            #C8A14B;
      --gold-deep:       #8C6A1F;
      --ink:             #3A1F0E;
      --ink-soft:        #5C3A1F;
      --shadow-soft: 0 2px 0 rgba(58,31,14,.10), 0 6px 18px rgba(58,31,14,.10);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; overscroll-behavior: none; }
    body {
      font-family: "Patrick Hand", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 10%, rgba(200,161,75,.18), transparent 40%),
        radial-gradient(circle at 80% 90%, rgba(122,29,29,.10), transparent 40%),
        linear-gradient(180deg, var(--parchment-light), var(--parchment));
      display: flex;
      flex-direction: column;
      touch-action: manipulation;
    }

    .topbar {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(200,161,75,.4);
      background: rgba(255,248,225,.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .back {
      justify-self: start;
      font-family: "Caveat", cursive;
      font-weight: 700;
      font-size: 22px;
      color: var(--maroon);
      text-decoration: none;
      padding: 4px 10px;
      border-radius: 999px;
    }
    .back:hover { background: rgba(122,29,29,.08); }
    .title-block { text-align: center; min-width: 0; }
    .title-block h1 {
      margin: 0;
      font-family: "Caveat", cursive;
      font-weight: 700;
      font-size: 26px;
      color: var(--maroon);
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .title-block p {
      margin: 0;
      font-size: 13px;
      color: var(--ink-soft);
      opacity: 0.8;
    }
    .mode-toggle {
      justify-self: end;
      display: inline-flex;
      background: rgba(255,248,225,.7);
      border: 1.5px solid var(--gold);
      border-radius: 999px;
      padding: 3px;
      gap: 2px;
    }
    .mode-btn {
      appearance: none;
      border: 0;
      background: transparent;
      font-family: "Caveat", cursive;
      font-weight: 700;
      font-size: 18px;
      color: var(--gold-deep);
      padding: 4px 14px;
      border-radius: 999px;
      cursor: pointer;
      letter-spacing: 0.3px;
    }
    .mode-btn.active {
      background: var(--maroon);
      color: #FFF8E7;
    }
    .mode-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .stage {
      flex: 1 1 auto;
      position: relative;
      overflow: hidden;
    }
    .frame {
      position: absolute;
      inset: 0;
      overflow: hidden;
      touch-action: none;
    }
    .wrap {
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: 0 0;
      transition: transform 720ms cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform;
      box-shadow: 0 8px 28px rgba(58,31,14,.18);
      background: #fff;
    }
    .wrap.no-anim { transition: none !important; }
    .wrap.user-anim { transition: transform 360ms cubic-bezier(0.22, 1, 0.36, 1); }
    .wrap canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    /* Spotlight overlay — sits inside .wrap so it inherits the canvas transform
       and covers the full page. A radial-gradient creates a soft bright ellipse
       around the active subject (panel rect, title strip) with the rest dimmed.
       The @property declarations let the gradient center/radii interpolate as
       CSS variables, so panel-to-panel transitions are smooth on the new curve. */
    @property --sp-cx { syntax: '<percentage>'; initial-value: 50%; inherits: false; }
    @property --sp-cy { syntax: '<percentage>'; initial-value: 50%; inherits: false; }
    @property --sp-rx { syntax: '<percentage>'; initial-value: 30%; inherits: false; }
    @property --sp-ry { syntax: '<percentage>'; initial-value: 30%; inherits: false; }
    .panel-spotlight {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(
        ellipse var(--sp-rx, 30%) var(--sp-ry, 30%) at var(--sp-cx, 50%) var(--sp-cy, 50%),
        transparent 0%,
        transparent 70%,
        rgba(0, 0, 0, 0.55) 100%
      );
      transition:
        --sp-cx 720ms cubic-bezier(0.22, 1, 0.36, 1),
        --sp-cy 720ms cubic-bezier(0.22, 1, 0.36, 1),
        --sp-rx 720ms cubic-bezier(0.22, 1, 0.36, 1),
        --sp-ry 720ms cubic-bezier(0.22, 1, 0.36, 1),
        opacity 360ms ease;
      will-change: --sp-cx, --sp-cy, --sp-rx, --sp-ry, opacity;
    }
    .panel-spotlight.visible { opacity: 1; }
    .panel-spotlight.snap {
      transition: opacity 360ms ease;
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      appearance: none;
      border: 1.5px solid var(--gold);
      background: rgba(255,248,225,.85);
      color: var(--maroon);
      width: 48px;
      height: 48px;
      border-radius: 999px;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      display: grid;
      place-items: center;
      padding: 0;
      transition: background 150ms ease, transform 150ms ease;
      z-index: 5;
    }
    .nav-btn:hover:not(:disabled) { background: #fff; transform: translateY(-50%) scale(1.06); }
    .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .nav-prev { left: 14px; }
    .nav-next { right: 14px; }

    .bottombar {
      flex: 0 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      padding: 8px 16px calc(8px + env(safe-area-inset-bottom));
      border-top: 1px solid rgba(200,161,75,.4);
      background: rgba(255,248,225,.55);
      font-size: 15px;
      color: var(--ink-soft);
      flex-wrap: wrap;
    }
    .indicator {
      font-family: "Caveat", cursive;
      font-weight: 700;
      font-size: 20px;
      color: var(--gold-deep);
    }
    .page-title {
      font-family: "Caveat", cursive;
      font-weight: 700;
      font-size: 20px;
      color: var(--maroon);
      opacity: 0.85;
    }
    .page-title::before {
      content: "·";
      margin-right: 10px;
      opacity: 0.6;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 10;
      pointer-events: none;
    }
    .overlay[hidden] { display: none !important; }
    .overlay-card {
      background: rgba(255,248,225,.92);
      border: 2px solid var(--gold);
      border-radius: 18px;
      padding: 22px 28px;
      box-shadow: var(--shadow-soft);
      text-align: center;
      max-width: 80vw;
      pointer-events: auto;
    }
    .overlay-card h2 {
      font-family: "Caveat", cursive;
      font-weight: 700;
      font-size: 30px;
      color: var(--maroon);
      margin: 0 0 6px;
    }
    .overlay-card p { margin: 4px 0 0; color: var(--ink-soft); font-size: 16px; }
    .spinner {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 3px solid var(--parchment-dark);
      border-top-color: var(--maroon);
      animation: spin 0.9s linear infinite;
      margin: 6px auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress {
      width: 200px;
      height: 8px;
      background: var(--parchment-dark);
      border-radius: 999px;
      overflow: hidden;
      margin: 10px auto 0;
    }
    .progress > div {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--maroon));
      width: 0%;
      transition: width 200ms ease;
    }

    @media (max-width: 560px) {
      .topbar { padding: 8px 10px; gap: 6px; }
      .title-block h1 { font-size: 20px; }
      .title-block p { display: none; }
      .back { font-size: 18px; padding: 4px 8px; }
      .mode-btn { font-size: 17px; padding: 6px 14px; }
      .nav-btn { width: 44px; height: 44px; font-size: 26px; }
      .nav-prev { left: 8px; }
      .nav-next { right: 8px; }
      .indicator, .page-title { font-size: 17px; }
      .bottombar { gap: 6px 12px; padding: 8px 12px calc(8px + env(safe-area-inset-bottom)); }
      .page-title { max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    }
    @media (max-width: 380px) {
      .topbar { padding: 6px 10px; }
      .title-block h1 { font-size: 18px; }
      .mode-btn { font-size: 16px; padding: 5px 12px; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <a class="back" href="./" aria-label="Back to comics">&#x2190; Comics</a>
    <div class="title-block">
      <h1 id="title">Loading…</h1>
      <p id="subtitle"></p>
    </div>
    <div class="mode-toggle" role="tablist" aria-label="View mode">
      <button id="mode-page" class="mode-btn active" role="tab" aria-selected="true">Page</button>
      <button id="mode-panel" class="mode-btn" role="tab" aria-selected="false">Panel</button>
    </div>
  </header>

  <main class="stage">
    <div class="frame" id="frame">
      <div class="wrap" id="wrap">
        <div class="panel-spotlight" id="panelSpotlight" aria-hidden="true"></div>
      </div>
    </div>

    <button class="nav-btn nav-prev" id="prevBtn" aria-label="Previous" disabled>&#x2039;</button>
    <button class="nav-btn nav-next" id="nextBtn" aria-label="Next" disabled>&#x203A;</button>

    <div class="overlay" id="loadingOverlay">
      <div class="overlay-card">
        <div class="spinner" aria-hidden="true"></div>
        <h2>Opening the comic…</h2>
        <p>Loading pages, please hold.</p>
        <div class="progress" aria-hidden="true"><div id="progressBar"></div></div>
      </div>
    </div>

    <div class="overlay" id="errorOverlay" hidden>
      <div class="overlay-card">
        <h2>Could not open the comic</h2>
        <p id="errorMessage">Please refresh the page or check your connection.</p>
      </div>
    </div>
  </main>

  <footer class="bottombar">
    <div class="indicator" id="indicator">Page – of –</div>
    <div class="page-title" id="pageTitle"></div>
  </footer>

  <script>
    // ----- config / state -----
    const params = new URLSearchParams(location.search);
    const comicId = params.get('id') || 'guru-pushya-yog';
    const RENDER_TARGET_WIDTH = 2200; // px — render canvas at this width for crisp zoom

    // gesture / user-zoom tuning
    const USER_SCALE_MIN = 1.0;     // never below the fitted base view
    const USER_SCALE_MAX = 5.0;     // 5x on top of base — readable on phones
    const DOUBLE_TAP_MS = 320;
    const DOUBLE_TAP_DIST = 28;
    const DOUBLE_TAP_ZOOM = 2.4;
    const SWIPE_MIN_DX = 50;
    const SWIPE_MAX_MS = 600;
    const SWIPE_RATIO = 1.4;
    const TAP_MAX_MS = 250;
    const TAP_MAX_MOVE = 10;

    let manifest = null;
    let pdf = null;
    let pageIdx = 0;            // 0-based index into manifest.pages
    let panelIdx = -1;          // -1 = full-page view, else panel index
    const renderCache = new Map();  // pdfPageNum -> canvas
    const inflight = new Map();     // pdfPageNum -> Promise<canvas>

    // base transform from applyTransform() (fit current view) and a user-driven
    // zoom/pan layered on top from pinch/double-tap gestures.
    let baseS = 1, baseTx = 0, baseTy = 0;
    let userS = 1, userTx = 0, userTy = 0;

    // intro flow for entering a new page in panel mode
    // states: null (no intro), 'page' (showing full page), 'title' (zoomed on header strip)
    let introState = null;
    let introTargetPanel = 0;
    let introTimers = [];
    // Intro phases (page -> title -> panel) are all reader-driven via next/prev now.

    // page header strip rect — derived per-page from the first panel's y so it stays
    // accurate even when a page has a different aspect ratio (e.g. "The Crowd").
    function headerRectFor(page) {
      const firstY = (page.panels && page.panels[0]) ? page.panels[0].y : 0.065;
      return { x: 0.005, y: 0.0, w: 0.99, h: Math.max(0.045, firstY - 0.005) };
    }

    // ----- elements -----
    const el = (id) => document.getElementById(id);
    const wrap = el('wrap');
    const frame = el('frame');
    const loadingOverlay = el('loadingOverlay');
    const errorOverlay = el('errorOverlay');
    const progressBar = el('progressBar');

    // ----- init -----
    function whenPdfJsReady() {
      return new Promise((resolve) => {
        const check = () => {
          if (window.pdfjsLib) resolve();
          else setTimeout(check, 30);
        };
        check();
      });
    }

    function bumpReadCounter(id) {
      const url = `https://api.counterapi.dev/v1/lodhakartik/comic-${id}/up`;
      fetch(url, { cache: 'no-store' }).catch(() => {});
    }

    async function init() {
      try {
        bumpReadCounter(comicId);
        manifest = await fetch(`./${comicId}/manifest.json`, { cache: 'force-cache' })
          .then(r => { if (!r.ok) throw new Error('Manifest not found'); return r.json(); });

        document.title = `${manifest.title} · Kartik Lodha`;
        el('title').textContent = manifest.title;
        el('subtitle').textContent = manifest.subtitle || '';

        await whenPdfJsReady();
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const loadingTask = pdfjsLib.getDocument({
          url: `./${comicId}/${manifest.pdf}`,
          disableAutoFetch: false,
          disableStream: false,
        });
        loadingTask.onProgress = ({ loaded, total }) => {
          if (total) progressBar.style.width = Math.min(100, (loaded / total) * 100) + '%';
        };
        pdf = await loadingTask.promise;

        // restore state from hash
        const hashStr = location.hash.replace(/^#/, '');
        if (hashStr) {
          const hashParams = new URLSearchParams(hashStr);
          const p = parseInt(hashParams.get('p'), 10);
          if (!isNaN(p) && p >= 1 && p <= manifest.pages.length) pageIdx = p - 1;
          const pnRaw = hashParams.get('pn');
          if (pnRaw !== null) {
            const pn = parseInt(pnRaw, 10);
            if (!isNaN(pn)) panelIdx = pn;
          }
        }

        loadingOverlay.hidden = true;
        await mountPageCanvas();
        const initialIntro = (panelIdx >= 0 && meta(pageIdx).panels.length > 0);
        if (initialIntro) {
          startPageIntro(panelIdx);
        } else {
          applyTransform();
          updateUI();
        }
        updateHash();
        prefetchNeighbors();
        wireEvents();
      } catch (err) {
        console.error('[reader] init failed:', err);
        loadingOverlay.hidden = true;
        errorOverlay.hidden = false;
        const msg = (err && (err.message || err.name)) ? `${err.name || 'Error'}: ${err.message || ''}` : 'Unknown error';
        el('errorMessage').textContent = msg + '. Please refresh.';
      }
    }

    // ----- rendering -----
    async function getPageCanvas(pdfPageNum) {
      if (renderCache.has(pdfPageNum)) return renderCache.get(pdfPageNum);
      if (inflight.has(pdfPageNum)) return inflight.get(pdfPageNum);
      const task = (async () => {
        const page = await pdf.getPage(pdfPageNum);
        const baseVp = page.getViewport({ scale: 1 });
        const scale = RENDER_TARGET_WIDTH / baseVp.width;
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const ctx = canvas.getContext('2d', { alpha: false });
        await page.render({ canvasContext: ctx, viewport }).promise;
        renderCache.set(pdfPageNum, canvas);
        // simple LRU-ish cap
        if (renderCache.size > 5) {
          const firstKey = renderCache.keys().next().value;
          if (firstKey !== pdfPageNum) renderCache.delete(firstKey);
        }
        return canvas;
      })();
      inflight.set(pdfPageNum, task);
      task.finally(() => inflight.delete(pdfPageNum));
      return task;
    }

    function meta(idx) { return manifest.pages[idx]; }

    function activeCanvas() {
      return wrap.querySelector('canvas');
    }

    async function mountPageCanvas() {
      const m = meta(pageIdx);
      const canvas = await getPageCanvas(m.pdfPage);
      const existing = activeCanvas();
      const isNewCanvas = existing !== canvas;
      if (isNewCanvas) {
        if (existing) existing.remove();
        // Insert canvas as the first child so it paints UNDER the spotlight overlay.
        wrap.insertBefore(canvas, wrap.firstChild);
      }
      wrap.style.width = canvas.width + 'px';
      wrap.style.height = canvas.height + 'px';
      if (isNewCanvas) {
        // snap to the new page without animating from the previous canvas's frame
        wrap.classList.add('no-anim');
        applyTransform();
        requestAnimationFrame(() => requestAnimationFrame(() => wrap.classList.remove('no-anim')));
      }
    }

    // Kept for back-compat with hashchange handler (page mode page change).
    async function renderCurrent() {
      await mountPageCanvas();
      applyTransform();
      updateUI();
      updateHash();
    }

    function applyTransform() {
      const canvas = activeCanvas();
      if (!canvas) return;
      const CW = canvas.width;
      const CH = canvas.height;
      const vw = frame.clientWidth;
      const vh = frame.clientHeight;
      if (vw === 0 || vh === 0) {
        // layout not ready yet — retry next frame
        requestAnimationFrame(applyTransform);
        return;
      }
      const m = meta(pageIdx);
      let s, cx, cy;
      if (introState === 'title') {
        // zoom into the page header strip (PAGE N · title)
        const r = headerRectFor(m);
        const pw = r.w * CW, ph = r.h * CH;
        s = Math.min(vw / pw, vh / ph) * 0.92;
        cx = (r.x + r.w / 2) * CW;
        cy = (r.y + r.h / 2) * CH;
      } else if (introState === null && panelIdx >= 0 && m.panels && m.panels[panelIdx]) {
        const r = m.panels[panelIdx];
        // small bleed margin around the panel rect for breathing room
        const MX = 0.015, MY = 0.010;
        const x0 = Math.max(0, r.x - MX);
        const y0 = Math.max(0, r.y - MY);
        const x1 = Math.min(1, r.x + r.w + MX);
        const y1 = Math.min(1, r.y + r.h + MY);
        const ew = x1 - x0;
        const eh = y1 - y0;
        const pw = ew * CW, ph = eh * CH;
        s = Math.min(vw / pw, vh / ph) * 0.90;
        cx = (x0 + ew / 2) * CW;
        cy = (y0 + eh / 2) * CH;
      } else {
        // full page (intro 'page' phase, page mode, or no-panel page)
        s = Math.min(vw / CW, vh / CH) * 0.94;
        cx = CW / 2;
        cy = CH / 2;
      }
      baseS = s;
      baseTx = vw / 2 - cx * s;
      baseTy = vh / 2 - cy * s;
      commitTransform();
      updatePanelSpotlight();
    }

    // Derive a tight spotlight rect by trimming sibling overlaps to the gutter
    // midline. Manifest panel rects are authored with overlapping origins for
    // smooth camera framing (e.g. side-by-side rows at x=0 w=0.70 + x=0.30 w=0.70),
    // which makes the raw rect a bad spotlight bound. This walks siblings and
    // shrinks the active rect at any axis where another panel meaningfully
    // overlaps it. Insets/callouts (one rect fully inside another) are left
    // alone so the spotlight respects authored sub-panels.
    function tightPanelRect(panels, idx) {
      const r = panels[idx];
      if (!r) return null;
      let x0 = r.x, x1 = r.x + r.w;
      let y0 = r.y, y1 = r.y + r.h;
      const rx0 = r.x, rx1 = r.x + r.w, ry0 = r.y, ry1 = r.y + r.h;
      for (let i = 0; i < panels.length; i++) {
        if (i === idx) continue;
        const o = panels[i];
        const ox0 = o.x, ox1 = o.x + o.w;
        const oy0 = o.y, oy1 = o.y + o.h;
        // Skip containment in either direction (insets / sub-panels).
        const oContainsR = ox0 <= rx0 && ox1 >= rx1 && oy0 <= ry0 && oy1 >= ry1;
        const rContainsO = rx0 <= ox0 && rx1 >= ox1 && ry0 <= oy0 && ry1 >= oy1;
        if (oContainsR || rContainsO) continue;
        // Side-by-side: rows aligned (significant y overlap) → trim x at gutter midline.
        const yOverlap = Math.min(ry1, oy1) - Math.max(ry0, oy0);
        const minH = Math.min(r.h, o.h);
        if (yOverlap > minH * 0.5) {
          if (ox0 < rx0 && ox1 > rx0 && ox1 < rx1) {
            x0 = Math.max(x0, (ox1 + rx0) / 2);
          }
          if (ox0 > rx0 && ox0 < rx1 && ox1 > rx1) {
            x1 = Math.min(x1, (ox0 + rx1) / 2);
          }
        }
        // Stacked: columns aligned (significant x overlap) → trim y at gutter midline.
        const xOverlap = Math.min(rx1, ox1) - Math.max(rx0, ox0);
        const minW = Math.min(r.w, o.w);
        if (xOverlap > minW * 0.5) {
          if (oy0 < ry0 && oy1 > ry0 && oy1 < ry1) {
            y0 = Math.max(y0, (oy1 + ry0) / 2);
          }
          if (oy0 > ry0 && oy0 < ry1 && oy1 > ry1) {
            y1 = Math.min(y1, (oy0 + ry1) / 2);
          }
        }
      }
      return { x: x0, y: y0, w: x1 - x0, h: y1 - y0 };
    }

    // Position the spotlight overlay over the active subject in canvas-space.
    // Subject is the tight panel rect in panel mode, the header strip during the
    // intro 'title' phase, and nothing during 'page' phase / page mode.
    function updatePanelSpotlight() {
      const spotlight = el('panelSpotlight');
      if (!spotlight) return;
      const canvas = activeCanvas();
      const m = meta(pageIdx);
      let r = null;
      if (canvas && introState === 'title') {
        r = headerRectFor(m);
      } else if (canvas && introState === null && panelIdx >= 0 && m.panels && m.panels[panelIdx]) {
        r = tightPanelRect(m.panels, panelIdx);
      }
      if (!r) {
        spotlight.classList.remove('visible');
        return;
      }
      const snap = wrap.classList.contains('no-anim') || !spotlight.classList.contains('visible');
      if (snap) spotlight.classList.add('snap');
      // Map the subject rect to gradient center + radii. Putting the panel edge
      // at the 70% gradient stop (matches the CSS) means the bright ellipse
      // covers the panel cleanly and fades out over the gutter beyond.
      const SP_STOP = 0.70;
      const cxPct = (r.x + r.w / 2) * 100;
      const cyPct = (r.y + r.h / 2) * 100;
      const rxPct = (r.w / 2) / SP_STOP * 100;
      const ryPct = (r.h / 2) / SP_STOP * 100;
      spotlight.style.setProperty('--sp-cx', cxPct + '%');
      spotlight.style.setProperty('--sp-cy', cyPct + '%');
      spotlight.style.setProperty('--sp-rx', rxPct + '%');
      spotlight.style.setProperty('--sp-ry', ryPct + '%');
      spotlight.classList.add('visible');
      if (snap) {
        // Force reflow so the snap class commits before we remove it on the
        // next frame; subsequent updates animate normally.
        void spotlight.offsetWidth;
        requestAnimationFrame(() => spotlight.classList.remove('snap'));
      }
    }

    function commitTransform() {
      const fs = baseS * userS;
      const fx = userTx + baseTx * userS;
      const fy = userTy + baseTy * userS;
      wrap.style.transform = `translate(${fx}px, ${fy}px) scale(${fs})`;
    }

    function resetUserTransform() {
      userS = 1; userTx = 0; userTy = 0;
    }

    // Keep at least MIN px of canvas visible on every side once the user has
    // zoomed in. Operates in screen-pixel space, then converts back to the
    // user-transform vars so commitTransform() picks it up.
    function clampUserPan() {
      if (userS <= 1.001) return;
      const canvas = activeCanvas();
      if (!canvas) return;
      const fs = baseS * userS;
      let fx = baseTx * userS + userTx;
      let fy = baseTy * userS + userTy;
      const CW = canvas.width, CH = canvas.height;
      const vw = frame.clientWidth, vh = frame.clientHeight;
      const MIN = 40;
      if (CW * fs >= vw) {
        fx = Math.min(fx, 0);
        fx = Math.max(fx, vw - CW * fs);
      } else {
        fx = Math.max(fx, MIN - CW * fs);
        fx = Math.min(fx, vw - MIN);
      }
      if (CH * fs >= vh) {
        fy = Math.min(fy, 0);
        fy = Math.max(fy, vh - CH * fs);
      } else {
        fy = Math.max(fy, MIN - CH * fs);
        fy = Math.min(fy, vh - MIN);
      }
      userTx = fx - baseTx * userS;
      userTy = fy - baseTy * userS;
    }

    // ----- page intro flow -----
    function cancelIntroSilent() {
      introTimers.forEach(clearTimeout);
      introTimers = [];
      introState = null;
    }

    function skipIntro() {
      if (introState === null) return false;
      cancelIntroSilent();
      applyTransform();
      updateUI();
      return true;
    }

    function startPageIntro(targetPanel) {
      const m = meta(pageIdx);
      cancelIntroSilent();
      resetUserTransform();
      if (!m.panels || m.panels.length === 0) {
        // no panels on this page — just show the full page
        panelIdx = 0; // sentinel; applyTransform falls back to full page
        applyTransform();
        updateUI();
        return;
      }
      introTargetPanel = Math.max(0, Math.min(m.panels.length - 1, targetPanel));
      panelIdx = introTargetPanel; // keep state coherent (mode = panel)
      introState = 'page';
      applyTransform(); // full page (introState !== null) — holds until Next
      updateUI();
    }

    function prefetchNeighbors() {
      const n = manifest.pages[pageIdx + 1];
      const p = manifest.pages[pageIdx - 1];
      if (n) getPageCanvas(n.pdfPage).catch(() => {});
      if (p) getPageCanvas(p.pdfPage).catch(() => {});
    }

    // ----- navigation -----
    function isFirstPosition() {
      if (pageIdx > 0) return false;
      if (panelIdx === -1) return true;
      return panelIdx <= 0;
    }
    function isLastPosition() {
      if (pageIdx < manifest.pages.length - 1) return false;
      const m = meta(pageIdx);
      if (panelIdx === -1) return true;
      return panelIdx >= Math.max(0, m.panels.length - 1);
    }

    async function next() {
      resetUserTransform();
      // intro 'page' phase → step to the title stop
      if (introState === 'page') {
        cancelIntroSilent();
        introState = 'title';
        applyTransform();
        updateUI();
        return;
      }
      // intro 'title' phase → reveal first real panel (panelIdx already preset)
      if (introState === 'title') {
        cancelIntroSilent();
        applyTransform();
        updateUI();
        updateHash();
        return;
      }
      const m = meta(pageIdx);
      if (panelIdx === -1) {
        // page mode — simple page advance, no intro
        if (pageIdx < manifest.pages.length - 1) {
          pageIdx++;
          await mountPageCanvas();
          applyTransform();
          updateUI();
          updateHash();
          prefetchNeighbors();
        }
        return;
      }
      // panel mode — within page
      if (m.panels.length > 0 && panelIdx < m.panels.length - 1) {
        panelIdx++;
        applyTransform();
        updateUI();
        updateHash();
        return;
      }
      // panel mode — cross to next page (with intro)
      if (pageIdx < manifest.pages.length - 1) {
        pageIdx++;
        await mountPageCanvas();
        updateHash();
        prefetchNeighbors();
        startPageIntro(0);
      }
    }

    async function prev() {
      resetUserTransform();
      // intro 'page' or 'title' phase → step out of this page's intro backwards
      if (introState === 'page' || introState === 'title') {
        cancelIntroSilent();
        if (pageIdx > 0) {
          pageIdx--;
          await mountPageCanvas();
          const pm = meta(pageIdx);
          panelIdx = Math.max(0, pm.panels.length - 1);
          applyTransform();
          updateUI();
          updateHash();
          prefetchNeighbors();
        } else {
          applyTransform();
          updateUI();
        }
        return;
      }
      if (panelIdx === -1) {
        if (pageIdx > 0) {
          pageIdx--;
          await mountPageCanvas();
          applyTransform();
          updateUI();
          updateHash();
          prefetchNeighbors();
        }
        return;
      }
      // panel mode — within page
      if (panelIdx > 0) {
        panelIdx--;
        applyTransform();
        updateUI();
        updateHash();
        return;
      }
      // panel mode — at first panel: back to the title stop of the same page
      const m = meta(pageIdx);
      if (panelIdx === 0 && m.panels && m.panels.length > 0) {
        introState = 'title';
        applyTransform();
        updateUI();
        updateHash();
        return;
      }
      // fallback: no panels on current page → cross to previous page (last panel, no intro)
      if (pageIdx > 0) {
        pageIdx--;
        await mountPageCanvas();
        const pm = meta(pageIdx);
        panelIdx = Math.max(0, pm.panels.length - 1);
        applyTransform();
        updateUI();
        updateHash();
        prefetchNeighbors();
      }
    }

    async function setMode(mode) {
      cancelIntroSilent();
      resetUserTransform();
      if (mode === 'page') {
        panelIdx = -1;
        applyTransform();
        updateUI();
        updateHash();
        return;
      }
      // panel mode
      const m = meta(pageIdx);
      if (m.panels.length > 0) {
        // same-page Page→Panel toggle: jump straight to panel 0, no intro
        panelIdx = 0;
        applyTransform();
        updateUI();
        updateHash();
        return;
      }
      // current page has no panels (cover or any panel-less page) — stay here
      // and show full page. applyTransform falls back to full-page render because
      // panels[0] is undefined. Next falls through in next() to play the intro
      // on the following page.
      panelIdx = 0;
      applyTransform();
      updateUI();
      updateHash();
    }

    // ----- UI sync -----
    function updateUI() {
      const m = meta(pageIdx);
      el('pageTitle').textContent = m.title || '';
      const coverPdfPage = manifest.cover && manifest.cover.pdfPage;
      const isCover = m.pdfPage === coverPdfPage;
      const contentCount = manifest.pages.filter(p => p.pdfPage !== coverPdfPage).length;
      const printedNumber = isCover ? 0 : pageIdx;
      let ind = isCover ? 'Cover' : `Page ${printedNumber} of ${contentCount}`;
      if (introState === 'title') {
        ind += `  ·  Title`;
      } else if (!introState && panelIdx >= 0 && m.panels && m.panels.length > 0 && panelIdx < m.panels.length) {
        ind += `  ·  Panel ${panelIdx + 1} of ${m.panels.length}`;
      }
      el('indicator').textContent = ind;
      el('mode-page').classList.toggle('active', panelIdx === -1);
      el('mode-page').setAttribute('aria-selected', String(panelIdx === -1));
      el('mode-panel').classList.toggle('active', panelIdx >= 0);
      el('mode-panel').setAttribute('aria-selected', String(panelIdx >= 0));
      el('prevBtn').disabled = isFirstPosition();
      el('nextBtn').disabled = isLastPosition();
    }

    function updateHash() {
      const p = new URLSearchParams();
      p.set('p', String(pageIdx + 1));
      if (panelIdx >= 0) p.set('pn', String(panelIdx));
      const newHash = '#' + p.toString();
      if (location.hash !== newHash) history.replaceState(null, '', newHash);
    }

    // ----- events -----
    function wireEvents() {
      el('prevBtn').addEventListener('click', prev);
      el('nextBtn').addEventListener('click', next);
      el('mode-page').addEventListener('click', () => setMode('page'));
      el('mode-panel').addEventListener('click', () => setMode('panel'));

      window.addEventListener('keydown', (e) => {
        if (e.target && e.target.tagName === 'INPUT') return;
        if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
          e.preventDefault(); next();
        } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
          e.preventDefault(); prev();
        } else if (e.key === 'p' || e.key === 'P') {
          setMode('page');
        } else if (e.key === 'c' || e.key === 'C') {
          setMode('panel');
        } else if (e.key === 'Home') {
          (async () => {
            cancelIntroSilent();
            resetUserTransform();
            const wasPanelMode = panelIdx >= 0;
            pageIdx = 0;
            panelIdx = wasPanelMode ? 0 : -1;
            await mountPageCanvas();
            if (wasPanelMode && meta(pageIdx).panels.length > 0) {
              startPageIntro(0);
            } else {
              applyTransform();
              updateUI();
            }
            updateHash();
            prefetchNeighbors();
          })();
        } else if (e.key === 'End') {
          (async () => {
            cancelIntroSilent();
            resetUserTransform();
            const wasPanelMode = panelIdx >= 0;
            pageIdx = manifest.pages.length - 1;
            const lm = meta(pageIdx);
            const lastPanel = Math.max(0, lm.panels.length - 1);
            panelIdx = wasPanelMode ? lastPanel : -1;
            await mountPageCanvas();
            if (wasPanelMode && lm.panels.length > 0) {
              startPageIntro(lastPanel);
            } else {
              applyTransform();
              updateUI();
            }
            updateHash();
            prefetchNeighbors();
          })();
        }
      });

      window.addEventListener('resize', () => {
        resetUserTransform();
        applyTransform();
      });

      // pointer-event gesture handler: pinch zoom, single-finger pan when zoomed,
      // double-tap to toggle zoom, swipe at baseline. Active touch points live in
      // the `pointers` map; `gesture` tracks the current interpretation.
      const pointers = new Map();
      let gesture = 'none'; // 'none' | 'maybe-swipe' | 'pan' | 'pinch'
      let startPinch = null; // { cx, cy, dist, userS, userTx, userTy }
      let startPan = null;   // { cx, cy, userTx, userTy }
      let startTap = null;   // { x, y, t } — for tap/swipe decision on release
      let lastTap = null;    // { x, y, t } — for double-tap detection
      let snapTimer = null;

      function centroid() {
        let cx = 0, cy = 0, n = 0;
        for (const p of pointers.values()) { cx += p.x; cy += p.y; n++; }
        return n ? { x: cx / n, y: cy / n } : { x: 0, y: 0 };
      }
      function pinchDist() {
        if (pointers.size < 2) return 0;
        const arr = [...pointers.values()];
        return Math.hypot(arr[0].x - arr[1].x, arr[0].y - arr[1].y);
      }

      function setLiveAnim(on) {
        if (on) {
          wrap.classList.add('no-anim');
          wrap.classList.remove('user-anim');
        } else {
          wrap.classList.remove('no-anim');
        }
      }

      function animateSnap() {
        wrap.classList.remove('no-anim');
        wrap.classList.add('user-anim');
        commitTransform();
        if (snapTimer) clearTimeout(snapTimer);
        snapTimer = setTimeout(() => {
          wrap.classList.remove('user-anim');
          snapTimer = null;
        }, 340);
      }

      function doubleTapZoom(x, y) {
        if (userS > 1.05) {
          resetUserTransform();
        } else {
          const k = DOUBLE_TAP_ZOOM;
          userS = k;
          userTx = x * (1 - k);
          userTy = y * (1 - k);
          clampUserPan();
        }
        animateSnap();
      }

      frame.addEventListener('pointerdown', (e) => {
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        try { frame.setPointerCapture(e.pointerId); } catch {}
        pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        if (pointers.size === 1) {
          gesture = 'maybe-swipe';
          startTap = { x: e.clientX, y: e.clientY, t: Date.now() };
          setLiveAnim(true);
        } else if (pointers.size === 2) {
          startTap = null;
          gesture = 'pinch';
          const c = centroid();
          startPinch = { cx: c.x, cy: c.y, dist: pinchDist(), userS, userTx, userTy };
          setLiveAnim(true);
        }
      });

      frame.addEventListener('pointermove', (e) => {
        if (!pointers.has(e.pointerId)) return;
        pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

        if (gesture === 'maybe-swipe' && userS > 1.001) {
          // promote to pan once we know the user is zoomed in
          gesture = 'pan';
          startPan = { cx: startTap.x, cy: startTap.y, userTx, userTy };
        }

        if (gesture === 'pan') {
          e.preventDefault();
          userTx = startPan.userTx + (e.clientX - startPan.cx);
          userTy = startPan.userTy + (e.clientY - startPan.cy);
          clampUserPan();
          commitTransform();
        } else if (gesture === 'pinch' && pointers.size >= 2) {
          e.preventDefault();
          const c = centroid();
          const d = pinchDist();
          if (!startPinch.dist) return;
          const k = d / startPinch.dist;
          const newUserS = Math.max(USER_SCALE_MIN, Math.min(USER_SCALE_MAX, startPinch.userS * k));
          const kEff = newUserS / startPinch.userS;
          userS = newUserS;
          userTx = c.x - kEff * (startPinch.cx - startPinch.userTx);
          userTy = c.y - kEff * (startPinch.cy - startPinch.userTy);
          clampUserPan();
          commitTransform();
        }
      }, { passive: false });

      function endPointer(e) {
        if (!pointers.has(e.pointerId)) return;
        const wasGesture = gesture;
        const ex = e.clientX, ey = e.clientY;
        pointers.delete(e.pointerId);
        try { frame.releasePointerCapture(e.pointerId); } catch {}

        // pinch ending with one finger still down → continue as pan
        if (wasGesture === 'pinch' && pointers.size === 1) {
          const remaining = [...pointers.values()][0];
          gesture = 'pan';
          startPan = { cx: remaining.x, cy: remaining.y, userTx, userTy };
          return;
        }
        if (pointers.size > 0) return;

        if (wasGesture === 'maybe-swipe' && startTap) {
          const dx = ex - startTap.x;
          const dy = ey - startTap.y;
          const dt = Date.now() - startTap.t;
          const isTap = dt < TAP_MAX_MS && Math.abs(dx) < TAP_MAX_MOVE && Math.abs(dy) < TAP_MAX_MOVE;
          const isMouse = e.pointerType === 'mouse';
          if (isTap) {
            const now = Date.now();
            if (lastTap && now - lastTap.t < DOUBLE_TAP_MS
                && Math.hypot(ex - lastTap.x, ey - lastTap.y) < DOUBLE_TAP_DIST) {
              lastTap = null;
              if (isMouse) {
                setLiveAnim(false);
                setMode(panelIdx === -1 ? 'panel' : 'page');
              } else {
                doubleTapZoom(ex, ey);
              }
            } else {
              lastTap = { x: ex, y: ey, t: now };
              setLiveAnim(false);
            }
          } else if (!isMouse && userS < 1.01 && dt < SWIPE_MAX_MS
                     && Math.abs(dx) > SWIPE_MIN_DX
                     && Math.abs(dx) > Math.abs(dy) * SWIPE_RATIO) {
            lastTap = null;
            setLiveAnim(false);
            if (dx < 0) next(); else prev();
          } else {
            setLiveAnim(false);
          }
        } else if (wasGesture === 'pinch' || wasGesture === 'pan') {
          if (userS < 1.01) {
            resetUserTransform();
            animateSnap();
          } else {
            setLiveAnim(false);
          }
        } else {
          setLiveAnim(false);
        }

        gesture = 'none';
        startPan = null;
        startPinch = null;
        startTap = null;
      }

      frame.addEventListener('pointerup', endPointer);
      frame.addEventListener('pointercancel', endPointer);

      window.addEventListener('hashchange', () => {
        const hashParams = new URLSearchParams(location.hash.replace(/^#/, ''));
        const p = parseInt(hashParams.get('p'), 10);
        const pn = hashParams.get('pn');
        const newPage = (!isNaN(p) && p >= 1 && p <= manifest.pages.length) ? p - 1 : 0;
        const newPanel = (pn === null) ? -1 : parseInt(pn, 10);
        (async () => {
          if (newPage !== pageIdx) {
            cancelIntroSilent();
            resetUserTransform();
            pageIdx = newPage;
            panelIdx = newPanel;
            await mountPageCanvas();
            if (newPanel >= 0 && meta(pageIdx).panels.length > 0) {
              startPageIntro(newPanel);
            } else {
              applyTransform();
              updateUI();
            }
            prefetchNeighbors();
          } else if (newPanel !== panelIdx) {
            skipIntro();
            resetUserTransform();
            panelIdx = newPanel;
            applyTransform();
            updateUI();
          }
        })();
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init, { once: true });
    } else {
      init();
    }
  </script>
</body>
</html>
